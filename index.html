<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Nine sayings from the oldest text of the Way. One at a time.">
<meta name="robots" content="noindex, nofollow, noarchive, noimageindex">
<title>The Way</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='10' fill='none' stroke='%238A8A86' stroke-width='1.2'/></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&family=Inter:wght@300&display=optional">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@1,400&family=Inter:wght@300&display=optional" rel="stylesheet">
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  :root {
    --bg:     #F4F4F2;
    --verse:  #1A1A18;
    --accent: #8A8A86;
    --meta:   #AEAEA8;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg:     #1C1C1A;
      --verse:  #EEEEE9;
      --accent: #6A6A66;
      --meta:   #4A4A46;
    }
  }

  html, body { height: 100%; }

  body {
    background-color: var(--bg);
    color: var(--verse);
    font-family: 'Cormorant Garamond', Georgia, serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 0 1.5rem;
  }

  main {
    flex: 1;
    max-width: 640px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4rem 0 3rem;
  }

  .verse {
    text-align: center;
    opacity: 0;
    animation: appear 0.9s ease forwards 0.3s;
  }

  .verse-text {
    font-size: clamp(1.45rem, 4vw, 2.05rem);
    font-weight: 400;
    line-height: 1.78;
    letter-spacing: 0.01em;
    font-style: italic;
  }

  .verse-text .key {
    font-style: normal;
  }

  footer {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    padding: 1.4rem 1.5rem;
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 0.5rem 2rem;
    opacity: 0;
    animation: appear 0.8s ease forwards 0.9s;
  }

  footer span {
    font-family: 'Inter', sans-serif;
    font-size: 0.6rem;
    font-weight: 300;
    letter-spacing: 0.1em;
    color: var(--meta);
    white-space: nowrap;
  }

  footer a {
    color: var(--meta);
    text-decoration: none;
  }

  footer a:hover {
    color: var(--accent);
  }

  .footer-tagline {
    width: 100%;
    text-align: center;
  }

  @media (orientation: landscape) {
    .footer-tagline { width: auto; }
  }

  @keyframes appear {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  @media (prefers-reduced-motion: reduce) {
    .verse, footer {
      animation: none;
      opacity: 1;
    }
  }
</style>
</head>
<body>

<main>
  <div class="verse">
    <p class="verse-text" id="verse-text"></p>
  </div>
</main>

<footer>
  <span class="footer-tagline">Nothing kept · Nothing watched</span>
  <span>Basic English · 850 words</span>
  <span><a href="https://creativecommons.org/publicdomain/zero/1.0/" target="_blank" rel="noopener">Public domain · CC0 1.0</a></span>
</footer>

<script>
  const verses = [
    "The way that can be named is not the way that has no end. The name that can be said is not the name that was before all things.",
    "The highest good is like water. Water helps all living things and does not fight for its place. It goes to the low places that men do not want. In this way, it is near to the Way.",
    "Knowing others is being bright. Knowing yourself is being wise. Winning over others takes force. Winning over yourself takes true power.",
    "Look at it — you will not see it. Its name is: <span class=\"key\">the without form.</span> Listen to it — you will not hear it. Its name is: <span class=\"key\">the without sound.</span> Take hold of it — you will not get it. Its name is: <span class=\"key\">the without body.</span> These three cannot be made clear by asking more questions.",
    "The Way gives birth to one. One gives birth to two. Two gives birth to three. Three gives birth to ten thousand things. Ten thousand things carry the dark on their back and hold the light in their arms. The meeting of these two makes the thing that keeps all living.",
    "To learn, add something every day. To follow the Way, take something away every day. Take away, and take away again, until you get to doing nothing. When you do nothing, nothing is left without doing.",
    "The great Way is very open. People keep to the small roads on the sides. When the court is bright and clean, the fields are full of weeds and the storerooms are without food. To put on bright and beautiful clothes, to carry sharp arms, to eat and drink more than enough — this is the way of those who take from others. It is not the Way.",
    "True words are not beautiful. Beautiful words are not true. Good men do not fight with words. Men who fight with words are not good. The wise do not put all things into one box. The more they do for others, the more they have. The more they give to others, the more they have in themselves. The Way of the sky is to do good, not to hurt. The Way of the wise man is to act, not to fight.",
    "A man who is alive is soft and full. A man who is dead is hard and dry. Green plants are soft and full of water. Dead plants are dry and hard. So the hard and strong are with death. The soft and the giving are with life."
  ];

  const KEY = 'the-way-seen';
  let seen = JSON.parse(sessionStorage.getItem(KEY) || '[]');
  const remaining = verses.map((_, i) => i).filter(i => !seen.includes(i));
  const pool = remaining.length > 0 ? remaining : verses.map((_, i) => i);
  if (remaining.length === 0) sessionStorage.setItem(KEY, '[]');
  const pick = pool[Math.floor(Math.random() * pool.length)];
  seen = remaining.length > 0 ? seen : [];
  seen.push(pick);
  sessionStorage.setItem(KEY, JSON.stringify(seen));
  document.getElementById('verse-text').innerHTML = verses[pick];
</script>
</body>
</html>
